<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Self-Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:32px 36px;color:#1E212B;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#006D77;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E212B;margin-bottom:6px;line-height:1.3;}
.chart-subtitle{font-size:13px;color:#1E212B99;margin-bottom:20px;}
.legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#1E212B99;font-weight:500;}
.legend-line{width:22px;height:3px;border-radius:2px;flex-shrink:0;}
.chart-wrap{position:relative;}
svg{width:100%;overflow:visible;}
</style>
</head>
<body>
<div class="eyebrow">Overcoming Procrastination &middot; Longitudinal Outcome Data</div>
<div class="chart-title">Participant Self-Assessment of Productivity at Work</div>
<div class="chart-subtitle">Self-rated productivity by job duty type, June&ndash;December (workshop occurred in August)</div>
<div class="legend">
  <div class="legend-item"><div class="legend-line" style="background:#C3DBC5;"></div>"Core" Job Duties</div>
  <div class="legend-item"><div class="legend-line" style="background:#1E212B;"></div>Administrative Tasks</div>
  <div class="legend-item"><div class="legend-line" style="background:#006D77;"></div>Seasonal Duties</div>
</div>
<div class="chart-wrap">
<svg viewBox="0 0 560 300" id="prodchart">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#5C6370"/>
  </marker>
</defs>
<script>
// Data
const months = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const core =     [4,3,6,7,7,9,9];
const admin =    [2,2,5,5,6,8,8];
const seasonal = [1,2,5,7,8,8,9];
const W=560,H=260,pL=44,pR=20,pT=20,pB=44;
const cW=W-pL-pR, cH=H-pT-pB;
const maxV=10;

function xPos(i){ return pL + (i/(months.length-1))*cW; }
function yPos(v){ return pT + cH - (v/maxV)*cH; }

// Gridlines
for(let v=0;v<=10;v+=2){
  const y=yPos(v);
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',pL); line.setAttribute('x2',W-pR);
  line.setAttribute('y1',y); line.setAttribute('y2',y);
  line.setAttribute('stroke',v===0?'#1E212B':'#1E212B0F');
  line.setAttribute('stroke-width',v===0?1.5:1);
  document.getElementById('prodchart').appendChild(line);
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',pL-6); lbl.setAttribute('y',y+4);
  lbl.setAttribute('text-anchor','end'); lbl.setAttribute('font-size','10');
  lbl.setAttribute('fill','#1E212B66'); lbl.setAttribute('font-family','Inter,sans-serif');
  lbl.textContent=v;
  document.getElementById('prodchart').appendChild(lbl);
}

// X labels
months.forEach((m,i)=>{
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',xPos(i)); lbl.setAttribute('y',H-pB+18);
  lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','11');
  lbl.setAttribute('fill','#1E212B88'); lbl.setAttribute('font-family','Inter,sans-serif');
  lbl.setAttribute('font-weight', i===2?'700':'400');
  lbl.setAttribute('fill', i===2?'#1E212B':'#1E212B88');
  lbl.textContent=m;
  document.getElementById('prodchart').appendChild(lbl);
});

// Lines
function drawLine(data, color, dashed=false){
  const pts=data.map((v,i)=>xPos(i)+','+yPos(v)).join(' ');
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke',color);
  poly.setAttribute('stroke-width','2.5');
  poly.setAttribute('stroke-linejoin','round');
  poly.setAttribute('stroke-linecap','round');
  if(dashed) poly.setAttribute('stroke-dasharray','5 3');
  document.getElementById('prodchart').appendChild(poly);
  data.forEach((v,i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',xPos(i)); c.setAttribute('cy',yPos(v)); c.setAttribute('r',4);
    c.setAttribute('fill','white'); c.setAttribute('stroke',color); c.setAttribute('stroke-width','2');
    document.getElementById('prodchart').appendChild(c);
  });
}

drawLine(core,'#C3DBC5');
drawLine(admin,'#1E212B');
drawLine(seasonal,'#006D77');

// Workshop annotation arrow
const ax=xPos(2), ay=yPos(6)-8;
const arrowLine=document.createElementNS('http://www.w3.org/2000/svg','line');
arrowLine.setAttribute('x1',ax); arrowLine.setAttribute('y1',ay+40);
arrowLine.setAttribute('x2',ax); arrowLine.setAttribute('y2',ay+6);
arrowLine.setAttribute('stroke','#5C6370'); arrowLine.setAttribute('stroke-width','1.5');
arrowLine.setAttribute('marker-end','url(#arrow)');
document.getElementById('prodchart').appendChild(arrowLine);

const note=document.createElementNS('http://www.w3.org/2000/svg','text');
note.setAttribute('x',ax+6); note.setAttribute('y',ay+52);
note.setAttribute('font-size','10'); note.setAttribute('fill','#5C6370');
note.setAttribute('font-family','Inter,sans-serif'); note.setAttribute('font-style','italic');
note.textContent='Workshop: August';
document.getElementById('prodchart').appendChild(note);
</script>
</svg>
</div>
</body>
</html>
