<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workplace Essentials</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:32px 36px;color:#1E212B;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#006D77;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E212B;margin-bottom:6px;line-height:1.3;}
.chart-subtitle{font-size:13px;color:#1E212B99;margin-bottom:24px;}
.chart-body{display:flex;gap:32px;align-items:center;}
svg{flex-shrink:0;}
.legend-list{display:flex;flex-direction:column;gap:12px;}
.legend-item{display:flex;align-items:center;gap:10px;}
.legend-swatch{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
.legend-text{font-size:13px;color:#1E212B;}
.legend-pct{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1E212B;margin-left:auto;padding-left:12px;}
</style>
</head>
<body>
<div class="eyebrow">Stress Management &middot; Session Evaluation</div>
<div class="chart-title">Employee Opinion on Most Important Workplace Essentials</div>
<div class="chart-subtitle">Surgeon General's Five Workplace Essentials, ranked by coaching staff</div>
<div class="chart-body">
  <svg width="200" height="200" viewBox="0 0 200 200">
    <!-- Security 28.1% = 101.2deg, starts at -90 -->
    <path d="M100,100 L100,5 A95,95 0 0,1 190.6,56.5 Z" fill="#006D77"/>
    <!-- Harmony 24.6% = 88.6deg -->
    <path d="M100,100 L190.6,56.5 A95,95 0 0,1 147.8,192.6 Z" fill="#C3DBC5"/>
    <!-- Growth 18.4% = 66.2deg -->
    <path d="M100,100 L147.8,192.6 A95,95 0 0,1 52.8,190.2 Z" fill="#1E212B"/>
    <!-- Mattering 16.7% = 60.1deg -->
    <path d="M100,100 L52.8,190.2 A95,95 0 0,1 7.2,137.5 Z" fill="#DB6C79"/>
    <!-- Connection 12.3% = 44.3deg -->
    <path d="M100,100 L7.2,137.5 A95,95 0 0,1 100,5 Z" fill="#8FB996"/>
  </svg>
  <div class="legend-list">
    <div class="legend-item"><div class="legend-swatch" style="background:#006D77;"></div><div class="legend-text">Security</div><div class="legend-pct">28.1%</div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#C3DBC5;"></div><div class="legend-text">Harmony</div><div class="legend-pct">24.6%</div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#1E212B;"></div><div class="legend-text">Growth</div><div class="legend-pct">18.4%</div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#DB6C79;"></div><div class="legend-text">Mattering</div><div class="legend-pct">16.7%</div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#8FB996;"></div><div class="legend-text">Connection</div><div class="legend-pct">12.3%</div></div>
  </div>
</div>
</body>
</html>
