<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method Usage Breakdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:32px 36px;color:#1a1a1a;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B32;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.3;}
.subtitle{font-size:13px;color:#555;margin-bottom:20px;}
.chart-body{display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.donut-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
.donut-wrap svg{width:180px;height:180px;}
.legend-list{display:flex;flex-direction:column;gap:10px;flex:1;min-width:180px;}
.legend-item{display:flex;align-items:center;gap:10px;}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.legend-text{font-size:12.5px;color:#1a1a1a;flex:1;}
.legend-pct{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap;}
svg path{transform-origin:center;transition:transform 0.5s ease;}
</style>
</head>
<body>
<div class="eyebrow">Advanced Study Skills &middot; 6-Week Follow-Up</div>
<div class="chart-title">Method Usage Breakdown</div>
<div class="subtitle">Most useful skills learned in session, reported 6 weeks post-workshop</div>
<div class="chart-body">
  <div class="donut-wrap">
    <svg viewBox="0 0 200 200" id="adspie"></svg>
  </div>
  <div class="legend-list" id="adslegend"></div>
</div>
<script>
const segments=[
  {label:'Memory &amp; Retention',pct:36.8,color:'#9E1B32'},
  {label:'Test Prep Tools',pct:34.2,color:'#D4A5A5'},
  {label:'Critical Thinking',pct:18.4,color:'#3A3F47'},
  {label:'Intaking New Material',pct:10.5,color:'#E8D0D0'},
];
const svg=document.getElementById('adspie');
const legend=document.getElementById('adslegend');
let angle=-90;const cx=100,cy=100,ro=90,ri=44;const paths=[];
segments.forEach(s=>{
  const sweep=s.pct/100*360;
  const start=angle*(Math.PI/180),end=(angle+sweep)*(Math.PI/180);
  const x1o=cx+ro*Math.cos(start),y1o=cy+ro*Math.sin(start);
  const x2o=cx+ro*Math.cos(end),y2o=cy+ro*Math.sin(end);
  const x1i=cx+ri*Math.cos(end),y1i=cy+ri*Math.sin(end);
  const x2i=cx+ri*Math.cos(start),y2i=cy+ri*Math.sin(start);
  const large=sweep>180?1:0;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M ${x1o},${y1o} A ${ro},${ro} 0 ${large},1 ${x2o},${y2o} L ${x1i},${y1i} A ${ri},${ri} 0 ${large},0 ${x2i},${y2i} Z`);
  path.setAttribute('fill',s.color);path.setAttribute('stroke','white');path.setAttribute('stroke-width','2');
  path.style.transform='scale(0)';svg.appendChild(path);paths.push(path);angle+=sweep;
  const li=document.createElement('div');li.className='legend-item';
  li.innerHTML=`<div class="legend-swatch" style="background:${s.color};border:${s.color==='#E8D0D0'?'1px solid #ccc':'none'};"></div><div class="legend-text">${s.label}</div><div class="legend-pct">${s.pct}%</div>`;
  legend.appendChild(li);
});
const obs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting) paths.forEach((p,i)=>{p.style.transitionDelay=(i*0.08)+'s';p.style.transform='scale(1)';});
},{threshold:0.3});
obs.observe(svg);
</script>
</body>
</html>
