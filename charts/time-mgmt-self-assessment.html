<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Management Self-Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:20px 24px;color:#1a1a1a;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B32;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.3;}
.subtitle{font-size:13px;color:#555;margin-bottom:20px;}
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#555;font-weight:500;}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
svg{width:100%;overflow:visible;}
.bar{transform-origin:bottom;transform:scaleY(0);transition:transform 0.6s cubic-bezier(0.34,1.2,0.64,1);}
.bar.visible{transform:scaleY(1);}
</style>
</head>
<body>
<div class="eyebrow">Time Management &amp; Organization &middot; Longitudinal Outcome Data</div>
<div class="chart-title">Employee Self-Assessment of Session Skills</div>
<div class="subtitle">Self-rated skill level Pre-Session, Post-Session, and 6 Months Post-Session (scale 0–10)</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#E8D0D0;"></div>Pre-Session</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9E1B32;"></div>Post-Session</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3A3F47;"></div>6 Months Post</div>
</div>
<svg viewBox="0 0 560 260" id="tmchart">
</svg>
<script>
const cats=['Goal Setting','Prioritization','Organization','Time Mgmt','Consistency'];
const pre=[5,3,3,2,3],post=[6,5,4,3,4],sixmo=[7,8,5,7,6];
const colors=['#E8D0D0','#9E1B32','#3A3F47'];
const datasets=[pre,post,sixmo];
const W=560,H=220,pL=36,pR=20,pT=20,pB=50,cW=W-pL-pR,cH=H-pT-pB,maxV=10;
const groupW=cW/cats.length,barW=16,gap=4;
const svg=document.getElementById('tmchart');
const bars=[];

[0,2,4,6,8,10].forEach(v=>{
  const y=pT+cH-(v/maxV)*cH;
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',pL);l.setAttribute('x2',W-pR);l.setAttribute('y1',y);l.setAttribute('y2',y);
  l.setAttribute('stroke',v===0?'#1a1a1a':'#eee');l.setAttribute('stroke-width',v===0?1.5:1);
  svg.appendChild(l);
  const lb=document.createElementNS('http://www.w3.org/2000/svg','text');
  lb.setAttribute('x',pL-6);lb.setAttribute('y',y+4);lb.setAttribute('text-anchor','end');
  lb.setAttribute('font-size','10');lb.setAttribute('fill','#888');lb.setAttribute('font-family','Inter,sans-serif');
  lb.textContent=v;svg.appendChild(lb);
});

cats.forEach((cat,ci)=>{
  const gx=pL+ci*groupW+groupW/2;
  const totalW=(barW+gap)*3-gap,startX=gx-totalW/2;
  datasets.forEach((ds,di)=>{
    const bh=(ds[ci]/maxV)*cH,by=pT+cH-bh,bx=startX+di*(barW+gap);
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',bx);rect.setAttribute('y',by);rect.setAttribute('width',barW);rect.setAttribute('height',bh);
    rect.setAttribute('fill',colors[di]);rect.setAttribute('rx','3');
    rect.style.transformOrigin=`${bx+barW/2}px ${pT+cH}px`;
    rect.classList.add('bar');rect.style.transitionDelay=(ci*0.1+di*0.04)+'s';
    svg.appendChild(rect);bars.push(rect);
  });
  const xl=document.createElementNS('http://www.w3.org/2000/svg','text');
  xl.setAttribute('x',gx);xl.setAttribute('y',pT+cH+18);xl.setAttribute('text-anchor','middle');
  xl.setAttribute('font-size','11');xl.setAttribute('fill','#1a1a1a');xl.setAttribute('font-weight','600');
  xl.setAttribute('font-family','Inter,sans-serif');xl.textContent=cat;svg.appendChild(xl);
});

const obs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting) bars.forEach(b=>b.classList.add('visible'));
},{threshold:0.3});
obs.observe(svg);
</script>
</body>
</html>
