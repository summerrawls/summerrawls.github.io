<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Management Self-Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:32px 36px;color:#1E212B;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#006D77;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E212B;margin-bottom:6px;line-height:1.3;}
.chart-subtitle{font-size:13px;color:#1E212B99;margin-bottom:20px;}
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#1E212B99;font-weight:500;}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
svg{width:100%;overflow:visible;}
</style>
</head>
<body>
<div class="eyebrow">Time Management &amp; Organization &middot; Longitudinal Outcome Data</div>
<div class="chart-title">Employee Self-Assessment of Session Skills</div>
<div class="chart-subtitle">Self-rated skill level Pre-Session, Post-Session, and 6 Months Post-Session (scale 0&ndash;10)</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C3DBC5;"></div>Pre-Session</div>
  <div class="legend-item"><div class="legend-dot" style="background:#DB6C79;"></div>Post-Session</div>
  <div class="legend-item"><div class="legend-dot" style="background:#006D77;"></div>6 Months Post-Session</div>
</div>
<svg viewBox="0 0 560 260" id="tmchart">
<script>
const cats=['Goal Setting','Prioritization','Organization','Time Management','Consistency'];
const pre=[5,3,3,2,3];
const post=[6,5,4,3,4];
const sixmo=[7,8,5,7,6];
const colors=['#C3DBC5','#DB6C79','#006D77'];
const datasets=[pre,post,sixmo];
const W=560,H=220,pL=36,pR=20,pT=20,pB=50;
const cW=W-pL-pR,cH=H-pT-pB;
const maxV=10;
const groupW=cW/cats.length;
const barW=16,gap=4;

[0,2,4,6,8,10].forEach(v=>{
  const y=pT+cH-(v/maxV)*cH;
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',pL);line.setAttribute('x2',W-pR);
  line.setAttribute('y1',y);line.setAttribute('y2',y);
  line.setAttribute('stroke',v===0?'#1E212B':'#1E212B0F');
  line.setAttribute('stroke-width',v===0?1.5:1);
  document.getElementById('tmchart').appendChild(line);
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',pL-6);lbl.setAttribute('y',y+4);
  lbl.setAttribute('text-anchor','end');lbl.setAttribute('font-size','10');
  lbl.setAttribute('fill','#1E212B66');lbl.setAttribute('font-family','Inter,sans-serif');
  lbl.textContent=v;
  document.getElementById('tmchart').appendChild(lbl);
});

cats.forEach((cat,ci)=>{
  const gx=pL+ci*groupW+groupW/2;
  const totalW=(barW+gap)*3-gap;
  const startX=gx-totalW/2;
  datasets.forEach((ds,di)=>{
    const bh=(ds[ci]/maxV)*cH;
    const by=pT+cH-bh;
    const bx=startX+di*(barW+gap);
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',bx);rect.setAttribute('y',by);
    rect.setAttribute('width',barW);rect.setAttribute('height',bh);
    rect.setAttribute('fill',colors[di]);rect.setAttribute('rx','3');
    rect.style.animation=`growUp 0.6s cubic-bezier(0.34,1.2,0.64,1) ${0.1+ci*0.1+di*0.05}s both`;
    rect.style.transformOrigin=`${bx+barW/2}px ${pT+cH}px`;
    document.getElementById('tmchart').appendChild(rect);
  });
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',gx);lbl.setAttribute('y',pT+cH+18);
  lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','11');
  lbl.setAttribute('fill','#1E212B');lbl.setAttribute('font-weight','600');
  lbl.setAttribute('font-family','Inter,sans-serif');
  lbl.textContent=cat;
  document.getElementById('tmchart').appendChild(lbl);
});
</script>
</svg>
<style>@keyframes growUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}</style>
</body>
</html>
