<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Most Useful Strategies</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:white;padding:32px 36px;color:#1E212B;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#006D77;margin-bottom:8px;}
.chart-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E212B;margin-bottom:6px;line-height:1.3;}
.chart-subtitle{font-size:13px;color:#1E212B99;margin-bottom:20px;}
.chart-body{display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
svg{flex-shrink:0;}
.legend-list{display:flex;flex-direction:column;gap:10px;flex:1;min-width:180px;}
.legend-item{display:flex;align-items:center;gap:10px;}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.legend-text{font-size:12.5px;color:#1E212B;flex:1;line-height:1.3;}
.legend-pct{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1E212B;white-space:nowrap;}
</style>
</head>
<body>
<div class="eyebrow">Time Management &amp; Organization &middot; Session Evaluation</div>
<div class="chart-title">Most Useful Strategies in Session</div>
<div class="chart-subtitle">Participant-reported most useful framework category</div>
<div class="chart-body">
  <svg width="180" height="180" viewBox="0 0 200 200" id="tmpie"></svg>
  <div class="legend-list" id="tmlegend"></div>
</div>
<script>
// Estimated proportions from visual inspection
const segments=[
  {label:'Action Priority Matrix',pct:26,color:'#DB6C79'},
  {label:'SMART Goals',pct:20,color:'#8FB996'},
  {label:'Weekly Strategies',pct:18,color:'#E8E8E8'},
  {label:'Daily Strategies',pct:14,color:'#C3DBC5'},
  {label:'Monthly Strategies',pct:12,color:'#1E212B'},
  {label:'Quarterly Strategies',pct:10,color:'#006D77'},
];
const svg=document.getElementById('tmpie');
const legend=document.getElementById('tmlegend');
let angle=-90;
const cx=100,cy=100,r=90;
segments.forEach(s=>{
  const sweep=s.pct/100*360;
  const start=angle*(Math.PI/180);
  const end=(angle+sweep)*(Math.PI/180);
  const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
  const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
  const large=sweep>180?1:0;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M ${cx},${cy} L ${x1},${y1} A ${r},${r} 0 ${large},1 ${x2},${y2} Z`);
  path.setAttribute('fill',s.color);
  path.setAttribute('stroke','white');
  path.setAttribute('stroke-width','1.5');
  svg.appendChild(path);
  angle+=sweep;
  const li=document.createElement('div');
  li.className='legend-item';
  li.innerHTML=`<div class="legend-swatch" style="background:${s.color};border:${s.color==='#E8E8E8'?'1px solid #ccc':'none'};"></div><div class="legend-text">${s.label}</div><div class="legend-pct">~${s.pct}%</div>`;
  legend.appendChild(li);
});
</script>
</body>
</html>
